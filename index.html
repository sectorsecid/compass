<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kompas — Instrumen Navigasi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0d12;
    --panel: #10151c;
    --panel-2: #151b23;
    --line: #232a34;
    --face: #e9e6dd;
    --muted: #6b7480;
    --muted-2: #4a525e;
    --amber: #e0a446;
    --amber-dim: #7a5a2e;
    --steel: #4d6b85;
    --danger: #c65b4a;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--face);
    font-family: 'Manrope', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    min-height:100vh;
    min-height:100dvh;
    padding: max(20px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(224,164,70,0.06), transparent 60%),
      var(--bg);
  }

  /* ---------- Weather strip ---------- */
  .weather{
    width:100%;
    max-width: 420px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 12px 18px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    font-size: 13px;
    letter-spacing: 0.02em;
  }

  .weather .loc{
    display:flex;
    flex-direction:column;
    gap:2px;
    min-width:0;
  }
  .weather .loc .city{
    color: var(--face);
    font-weight:600;
    font-size: 13px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 160px;
  }
  .weather .loc .cond{
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .weather .temp{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--amber);
    display:flex;
    align-items:baseline;
    gap:2px;
    flex-shrink:0;
  }
  .weather .temp .deg{ font-size: 13px; color: var(--muted); }
  .weather .icon{ font-size: 20px; margin-right: 10px; flex-shrink:0; }
  .weather .icon-wrap{ display:flex; align-items:center; }

  .weather.loading .temp, .weather.loading .loc .city{ color: var(--muted-2); }
  .weather .refresh{
    background:none; border:none; color:var(--muted); cursor:pointer;
    font-size: 11px; padding: 4px 6px; opacity:0.7; font-family:'IBM Plex Mono',monospace;
  }
  .weather .refresh:hover{ color: var(--amber); opacity:1; }

  /* ---------- Center label above compass ---------- */
  .heading-readout{
    text-align:center;
    margin-top: 6px;
  }
  .heading-readout .deg-num{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15vw;
    max-font-size: 76px;
    line-height: 1;
    font-weight: 500;
    color: var(--face);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  @media (min-width: 480px){
    .heading-readout .deg-num{ font-size: 64px; }
  }
  .heading-readout .cardinal{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--amber);
    letter-spacing: 0.25em;
    margin-top: -4px;
  }

  /* ---------- Compass ---------- */
  .compass-wrap{
    position: relative;
    width: min(84vw, 340px);
    height: min(84vw, 340px);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .fixed-pointer{
    position:absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    width: 0; height:0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 11px solid var(--amber);
    filter: drop-shadow(0 0 6px rgba(224,164,70,0.5));
  }

  .dial{
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 42%, #161d26 0%, #0d1319 72%, #0a0f14 100%);
    border: 1px solid var(--line);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.02) inset,
      0 30px 60px -20px rgba(0,0,0,0.6),
      0 0 40px -10px rgba(224,164,70,0.05);
    transition: transform 0.15s linear;
    will-change: transform;
  }

  .tick{
    position:absolute;
    left:50%; top:0;
    width:1px; height: 10px;
    background: var(--muted-2);
    transform-origin: 50% 170px;
  }
  .tick.major{ height:16px; width:1.5px; background: var(--muted); }
  .tick.cardinal-tick{ height: 20px; width:2px; background: var(--face); }

  .dial-label{
    position:absolute;
    left:50%; top:26px;
    transform-origin: 50% 144px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .dial-label.n{ color: var(--amber); font-weight:600; font-size:15px; }
  .dial-label span{ display:inline-block; }

  .inner-ring{
    position:absolute;
    top: 50%; left:50%;
    width: 62%; height: 62%;
    transform: translate(-50%,-50%);
    border-radius:50%;
    border: 1px solid var(--line);
    background: linear-gradient(160deg, #12181f, #0b0f14);
  }

  .hub{
    position:absolute;
    top:50%; left:50%;
    width: 10px; height:10px;
    transform: translate(-50%,-50%);
    border-radius:50%;
    background: var(--amber);
    box-shadow: 0 0 12px 2px rgba(224,164,70,0.6);
    z-index: 4;
  }

  .needle{
    position:absolute;
    top:50%; left:50%;
    width: 4px;
    height: 58%;
    transform: translate(-50%,-100%);
    transform-origin: 50% 100%;
    z-index: 3;
    pointer-events:none;
  }
  .needle .half{
    position:absolute;
    left:0; width:100%;
  }
  .needle .north{
    top:0; height:56%;
    background: linear-gradient(to bottom, var(--amber), rgba(224,164,70,0.15));
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
  }
  .needle .south{
    bottom: 0; height: 42%;
    top: 58%;
    background: linear-gradient(to top, var(--steel), rgba(77,107,133,0.15));
    clip-path: polygon(50% 100%, 100% 0%, 0% 0%);
  }

  /* ---------- Footer / status & controls ---------- */
  .footer{
    width:100%;
    max-width: 420px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 12px;
  }

  .status{
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-align:center;
    min-height: 14px;
  }

  .enable-btn{
    background: var(--panel);
    border: 1px solid var(--amber-dim);
    color: var(--amber);
    padding: 12px 28px;
    border-radius: 100px;
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .enable-btn:active{ transform: scale(0.97); }
  .enable-btn:hover{ background: var(--panel-2); }
  .hidden{ display:none !important; }

  .coords{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted-2);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

  <div class="weather loading" id="weather">
    <div class="icon-wrap">
      <span class="icon" id="weatherIcon">◌</span>
      <div class="loc">
        <span class="city" id="weatherCity">Mencari lokasi…</span>
        <span class="cond" id="weatherCond">—</span>
      </div>
    </div>
    <div class="temp"><span id="weatherTemp">--</span><span class="deg">°C</span></div>
  </div>

  <div class="heading-readout">
    <div class="deg-num"><span id="headingNum">000</span>°</div>
    <div class="cardinal" id="headingCardinal">N</div>
  </div>

  <div class="compass-wrap">
    <div class="fixed-pointer"></div>
    <div class="dial" id="dial">
      <!-- ticks + labels generated by JS -->
      <div class="inner-ring"></div>
      <div class="needle" id="needle">
        <div class="half north"></div>
        <div class="half south"></div>
      </div>
      <div class="hub"></div>
    </div>
  </div>

  <div class="footer">
    <div class="coords" id="coords">— — , — —</div>
    <button class="enable-btn hidden" id="enableBtn">Aktifkan Sensor Kompas</button>
    <div class="status" id="status">Menunggu izin sensor…</div>
  </div>

<script>
(function(){
  const dial = document.getElementById('dial');
  const headingNum = document.getElementById('headingNum');
  const headingCardinal = document.getElementById('headingCardinal');
  const statusEl = document.getElementById('status');
  const enableBtn = document.getElementById('enableBtn');
  const coordsEl = document.getElementById('coords');

  // ---------- Build dial ticks & labels ----------
  const cardinals = [
    {deg:0, label:'N', cls:'n'},
    {deg:45, label:'NE'},
    {deg:90, label:'E'},
    {deg:135, label:'SE'},
    {deg:180, label:'S'},
    {deg:225, label:'SW'},
    {deg:270, label:'W'},
    {deg:315, label:'NW'},
  ];

  for(let d=0; d<360; d+=5){
    const t = document.createElement('div');
    t.className = 'tick';
    if(d % 90 === 0) t.className = 'tick cardinal-tick';
    else if(d % 30 === 0) t.className = 'tick major';
    t.style.transform = `translateX(-50%) rotate(${d}deg)`;
    dial.appendChild(t);
  }

  cardinals.forEach(c => {
    const l = document.createElement('div');
    l.className = 'dial-label' + (c.cls ? ' ' + c.cls : '');
    l.style.transform = `translateX(-50%) rotate(${c.deg}deg)`;
    const inner = document.createElement('span');
    inner.textContent = c.label;
    inner.style.display = 'inline-block';
    inner.style.transform = `rotate(${-c.deg}deg)`;
    l.appendChild(inner);
    dial.appendChild(l);
  });

  // ---------- Compass logic ----------
  const cardinalNames = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  function cardinalFromDeg(deg){
    const idx = Math.round(deg / 22.5) % 16;
    return cardinalNames[idx];
  }

  let currentRotation = 0;
  function setHeading(heading){
    heading = ((heading % 360) + 360) % 360;
    headingNum.textContent = String(Math.round(heading)).padStart(3,'0');
    headingCardinal.textContent = cardinalFromDeg(heading);
    // rotate dial opposite to heading so North always points true north
    let target = -heading;
    // shortest-path rotation to avoid spin-back
    let diff = target - currentRotation;
    diff = ((diff + 180) % 360 + 360) % 360 - 180;
    currentRotation += diff;
    dial.style.transform = `rotate(${currentRotation}deg)`;
  }

  function handleOrientation(e){
    let heading;
    if(typeof e.webkitCompassHeading === 'number'){
      heading = e.webkitCompassHeading; // iOS, already true-north-relative
    } else if(e.alpha !== null){
      heading = 360 - e.alpha; // approximate
    } else {
      return;
    }
    statusEl.textContent = 'Sensor aktif';
    setHeading(heading);
  }

  function startListening(){
    window.addEventListener('deviceorientationabsolute', handleOrientation, true);
    window.addEventListener('deviceorientation', handleOrientation, true);
  }

  function needsIOSPermission(){
    return typeof DeviceOrientationEvent !== 'undefined' &&
           typeof DeviceOrientationEvent.requestPermission === 'function';
  }

  if(needsIOSPermission()){
    enableBtn.classList.remove('hidden');
    statusEl.textContent = 'Ketuk tombol untuk mengizinkan akses sensor';
    enableBtn.addEventListener('click', () => {
      DeviceOrientationEvent.requestPermission().then(res => {
        if(res === 'granted'){
          enableBtn.classList.add('hidden');
          startListening();
        } else {
          statusEl.textContent = 'Izin ditolak — kompas berjalan mode manual';
          enableDemoMode();
        }
      }).catch(() => {
        statusEl.textContent = 'Sensor tidak tersedia — mode manual';
        enableDemoMode();
      });
    });
  } else if(window.DeviceOrientationEvent){
    startListening();
    // fallback: if no event fires within 2s, assume no sensor
    let gotEvent = false;
    window.addEventListener('deviceorientation', () => gotEvent = true, {once:true});
    setTimeout(() => {
      if(!gotEvent){
        statusEl.textContent = 'Sensor tidak terdeteksi — geser untuk mode manual';
        enableDemoMode();
      }
    }, 2000);
  } else {
    statusEl.textContent = 'Perangkat tidak mendukung sensor — geser untuk mode manual';
    enableDemoMode();
  }

  // ---------- Manual / demo mode (drag to rotate) ----------
  function enableDemoMode(){
    let dragging = false;
    let lastAngle = 0;
    let heading = 0;
    const wrap = document.querySelector('.compass-wrap');

    function angleFromEvent(clientX, clientY){
      const rect = wrap.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top + rect.height/2;
      return Math.atan2(clientY - cy, clientX - cx) * 180 / Math.PI;
    }

    function onDown(x,y){ dragging = true; lastAngle = angleFromEvent(x,y); }
    function onMove(x,y){
      if(!dragging) return;
      const a = angleFromEvent(x,y);
      let delta = a - lastAngle;
      lastAngle = a;
      heading = ((heading - delta) % 360 + 360) % 360;
      setHeading(heading);
    }
    function onUp(){ dragging = false; }

    wrap.style.cursor = 'grab';
    wrap.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', onUp);
    wrap.addEventListener('touchstart', e => { const t=e.touches[0]; onDown(t.clientX, t.clientY); }, {passive:true});
    wrap.addEventListener('touchmove', e => { const t=e.touches[0]; onMove(t.clientX, t.clientY); }, {passive:true});
    wrap.addEventListener('touchend', onUp);

    setHeading(0);
  }

  // ---------- Weather ----------
  const weatherEl = document.getElementById('weather');
  const wCity = document.getElementById('weatherCity');
  const wCond = document.getElementById('weatherCond');
  const wTemp = document.getElementById('weatherTemp');
  const wIcon = document.getElementById('weatherIcon');

  const weatherCodeMap = {
    0: ['Cerah','☀️'], 1: ['Cerah Berawan','🌤️'], 2: ['Berawan Sebagian','⛅'], 3: ['Mendung','☁️'],
    45: ['Berkabut','🌫️'], 48: ['Kabut Es','🌫️'],
    51: ['Gerimis Ringan','🌦️'], 53: ['Gerimis','🌦️'], 55: ['Gerimis Lebat','🌧️'],
    61: ['Hujan Ringan','🌧️'], 63: ['Hujan','🌧️'], 65: ['Hujan Lebat','🌧️'],
    71: ['Salju Ringan','🌨️'], 73: ['Salju','🌨️'], 75: ['Salju Lebat','❄️'],
    80: ['Hujan Sesaat','🌦️'], 81: ['Hujan Deras Sesaat','🌧️'], 82: ['Hujan Sangat Deras','⛈️'],
    95: ['Badai Petir','⛈️'], 96: ['Badai Petir + Es','⛈️'], 99: ['Badai Petir Hebat','⛈️'],
  };

  function fmtCoord(lat, lon){
    const ns = lat >= 0 ? 'N' : 'S';
    const ew = lon >= 0 ? 'E' : 'W';
    return `${Math.abs(lat).toFixed(3)}°${ns}, ${Math.abs(lon).toFixed(3)}°${ew}`;
  }

  async function loadWeather(lat, lon){
    coordsEl.textContent = fmtCoord(lat, lon);
    try{
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`);
      const data = await res.json();
      const code = data.current.weather_code;
      const temp = Math.round(data.current.temperature_2m);
      const [label, icon] = weatherCodeMap[code] || ['Tidak diketahui','🌡️'];
      wTemp.textContent = temp;
      wCond.textContent = label;
      wIcon.textContent = icon;
      weatherEl.classList.remove('loading');

      // reverse geocode for city name
      try{
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=id`);
        const geoData = await geoRes.json();
        if(geoData.results && geoData.results.length){
          const r = geoData.results[0];
          wCity.textContent = r.name + (r.admin1 ? ', ' + r.admin1 : '');
        } else {
          wCity.textContent = fmtCoord(lat, lon);
        }
      } catch(e){
        wCity.textContent = fmtCoord(lat, lon);
      }
    } catch(e){
      wCity.textContent = 'Cuaca tidak tersedia';
      wCond.textContent = 'Periksa koneksi';
      wIcon.textContent = '⚠️';
      weatherEl.classList.remove('loading');
    }
  }

  function initWeather(){
    if(!navigator.geolocation){
      wCity.textContent = 'Lokasi tidak didukung';
      weatherEl.classList.remove('loading');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => loadWeather(pos.coords.latitude, pos.coords.longitude),
      err => {
        wCity.textContent = 'Izin lokasi ditolak';
        wCond.textContent = 'Ketuk untuk coba lagi';
        wIcon.textContent = '📍';
        weatherEl.classList.remove('loading');
        weatherEl.style.cursor = 'pointer';
        weatherEl.addEventListener('click', initWeather, {once:true});
      },
      { enableHighAccuracy:false, timeout: 8000 }
    );
  }

  initWeather();
  setHeading(0);
})();
</script>
</body>
</html>
